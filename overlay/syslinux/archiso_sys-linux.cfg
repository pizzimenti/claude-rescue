LABEL arch
TEXT HELP
Boot the Claude Rescue field-repair environment on BIOS firmware.
Drops to a root shell and the Claude-assisted repair launcher.
ENDTEXT
MENU LABEL ^Boot Claude Rescue (BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-lts
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-lts.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID%
