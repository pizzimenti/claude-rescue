SERIAL 0 115200
UI vesamenu.c32
MENU BACKGROUND splash.png

# No MENU TITLE — the splash already renders "Claude Rescue" as its
# centerpiece. A vesamenu title bar over that would be redundant noise.

# Layout sized to fit the Claude Rescue splash design (overlay/syslinux/
# splash.png), regenerated from assets/boot-screen/splash-master.png via
# scripts/render-splash.sh:
#   - rows 1-7    : "Claude Rescue" wordmark + subtitles (in the splash)
#   - row 8       : ">_" prompt cursor (in the splash)
#   - rows 11-17  : MENU ROWS — boot entries draw here
#   - rows 19-22  : help text + tab message
#   - rows 23-25  : "F1 Help / repair. restore. recover." footer (in the splash)
#
# If you bump MENU ROWS or change VSHIFT, re-evaluate against the splash —
# overlap with the splash's footer at row 23+ looks broken.
MENU WIDTH 78
MENU MARGIN 4
MENU ROWS 6
MENU VSHIFT 11
MENU TABMSGROW 19
MENU CMDLINEROW 19
MENU HELPMSGROW 20
MENU HELPMSGENDROW 22

# Color palette: green-on-black CRT phosphor with amber accents, matching
# the splash design. The AARRGGBB hex values are what vesamenu.c32
# actually renders; the leading ANSI codes are the text-mode fallback for
# BIOSes that can't initialize a VBE mode.
# Refer to https://wiki.syslinux.org/wiki/index.php/Comboot/menu.c32

MENU COLOR border       30;42   #4033ff66 #a0000000 std
MENU COLOR sel          7;32;40 #ff000000 #ff33ff66 all
MENU COLOR unsel        32;40   #c033ff66 #00000000 std
MENU COLOR help         33;40   #c0ffaa00 #00000000 std
MENU COLOR timeout_msg  33;40   #80ffaa00 #00000000 std
MENU COLOR timeout      1;33;40 #c0ffaa00 #00000000 std
MENU COLOR msg07        32;40   #9033ff66 #00000000 std
MENU COLOR tabmsg       33;40   #c0ffaa00 #00000000 std

MENU CLEAR
MENU IMMEDIATE
