# systemd-boot loader configuration for Claude Rescue.
#
# Overrides the upstream archiso releng loader.conf. Two functional
# changes from upstream:
#
#   1. timeout — shortened from 15s to 10s. Rescue users typically know
#      what they're booting; 15s is a long stare at a near-empty menu.
#      10s leaves room for "wait, I want the speech variant" without
#      forcing an interrupt.
#
#   2. console-mode max — pick the highest-resolution text mode the
#      firmware exposes. On modern UEFI hardware (anything with HiDPI)
#      the default mode renders at 80x25 in a tiny corner of the
#      screen. `max` makes the menu legible on every laptop made in
#      the last decade.
#
# `default` and `beep` carried over from upstream. systemd-boot has no
# splash/banner mechanism, so unlike syslinux there's nothing else to
# brand here — UEFI users just see the entry list.

timeout      10
default      01-archiso-linux.conf
console-mode max
beep         on
